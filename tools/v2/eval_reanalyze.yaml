openapi: 3.0.0
info:
  title: Eval Reanalyze
  description: Re-run analysis on existing eval results with different settings
  version: 2.0.0

servers:
  - url: API_GATEWAY_URL_PLACEHOLDER
    description: AWS API Gateway

paths:
  /eval/reanalyze:
    post:
      operationId: eval_reanalyze
      summary: Re-analyze existing evaluation results
      description: |
        Re-runs the analyze step on existing eval results without re-running
        the full pipeline (generate, evaluate, enrich).

        USE THIS when:
        - User wants to re-analyze with RCA enabled/disabled
        - User wants to change the LLM model for judge/RCA
        - User says "reanalyze", "run analysis again", "analyze with RCA"
        - Previous run was done with skip_rca=true and user now wants RCA

        DOES NOT re-run: generate, evaluate, or enrich steps.
        DOES re-run: LLM-as-Judge + RCA on existing enriched test data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id:
                  type: string
                  description: "Session ID (auto-detects latest if omitted)"
                run_id:
                  type: string
                  description: "Run ID to re-analyze (auto-detects from session if omitted)"
                skip_judge:
                  type: boolean
                  description: "Skip LLM-as-Judge evaluation (default: false)"
                skip_rca:
                  type: boolean
                  description: "Skip RCA generation (default: false — RCA enabled)"
                model_id:
                  type: string
                  description: "LLM model for judge and RCA (default: llama-3-405b)"
      responses:
        '200':
          description: Re-analysis results
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_id:
                    type: string
                  run_id:
                    type: string
                  summary:
                    type: object
                    description: "Updated aggregate metrics including rca_summary"
                  settings_used:
                    type: object
                    description: "Settings that were applied for this re-analysis"
                  message:
                    type: string
